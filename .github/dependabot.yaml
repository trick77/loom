version: 2
updates:
  # Go backend
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    groups:
      go-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Pinned at v0.23.x for sqlite-vec ABI compatibility (see AGENTS.md);
      # bumping to v0.24+ breaks the current sqlite-vec binding.
      - dependency-name: github.com/ncruces/go-sqlite3
      # v2.3.4+ requires Go 1.26.1, while Slopr is intentionally pinned to Go 1.25.
      - dependency-name: github.com/johnfercher/maroto/v2
        versions: [">=2.3.4"]

  # React frontend
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    groups:
      npm-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Container base image. Dependabot's docker ecosystem matches backend/Containerfile
  # via /dockerfile|containerfile/i (Containerfile support landed when dependabot-core
  # closed #6067), so base-image bumps come as a grouped PR.
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]
