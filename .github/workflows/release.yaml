name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: ver
        name: Compute next version
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          LATEST=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          LATEST="${LATEST:-0.0.0}"
          IFS=. read -r MA MI PA <<< "$LATEST"
          case "$BUMP" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          NEXT="$MA.$MI.$PA"
          SHORT=$(git rev-parse --short HEAD)
          echo "previous=$LATEST" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "major=$MA"     >> "$GITHUB_OUTPUT"
          echo "minor=$MI"     >> "$GITHUB_OUTPUT"
          echo "short=$SHORT"  >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST -> $NEXT ($BUMP) at $SHORT" >> "$GITHUB_STEP_SUMMARY"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: companion_changes
        name: Detect companion image changes
        run: |
          if git diff --quiet "${{ steps.ver.outputs.previous }}"...HEAD -- fetch; then
            fetch_source_changed=false
          else
            fetch_source_changed=true
          fi
          if docker buildx imagetools inspect "ghcr.io/${{ github.repository }}-fetch:latest" >/dev/null 2>&1; then
            fetch_missing=false
          else
            fetch_missing=true
          fi
          if [ "$fetch_source_changed" = "true" ] || [ "$fetch_missing" = "true" ]; then
            echo "fetch_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "fetch_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Slopr image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Containerfile
          push: true
          platforms: linux/amd64
          build-args: |
            BACKEND_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.major }}.${{ steps.ver.outputs.minor }}
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.major }}
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.short }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Slopr UI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./ui/Containerfile
          push: true
          platforms: linux/amd64
          build-args: |
            SLOPR_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}-ui:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}-ui:${{ steps.ver.outputs.major }}.${{ steps.ver.outputs.minor }}
            ghcr.io/${{ github.repository }}-ui:${{ steps.ver.outputs.major }}
            ghcr.io/${{ github.repository }}-ui:${{ steps.ver.outputs.short }}
            ghcr.io/${{ github.repository }}-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push fetch MCP image
        if: ${{ steps.companion_changes.outputs.fetch_changed == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./fetch
          file: ./fetch/Containerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}-fetch:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}-fetch:${{ steps.ver.outputs.major }}.${{ steps.ver.outputs.minor }}
            ghcr.io/${{ github.repository }}-fetch:${{ steps.ver.outputs.major }}
            ghcr.io/${{ github.repository }}-fetch:${{ steps.ver.outputs.short }}
            ghcr.io/${{ github.repository }}-fetch:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Tag only AFTER required image pushes succeed, so a failed release never
      # leaves an orphan git tag behind. The fetch companion image is required
      # only when its source directory changed since the previous release.
      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"
