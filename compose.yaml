services:
  loom-ui:
    image: ghcr.io/trick77/loom-ui:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 60s
      timeout: 5s
      start_period: 10s
      start_interval: 5s
      retries: 3
    depends_on:
      loom:
        condition: service_healthy
    networks:
      - traefik
      - loom
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik
      traefik.http.routers.loom.rule: Host(`loom.trick77.com`)
      traefik.http.routers.loom.entrypoints: websecure
      traefik.http.routers.loom.tls: "true"
      traefik.http.services.loom.loadbalancer.server.port: "80"

  loom:
    image: ghcr.io/trick77/loom:latest
    user: "1000:1000"
    restart: unless-stopped
    environment:
      BACKEND_ADDR: ":8080"
      BACKEND_LOG_LEVEL: "${BACKEND_LOG_LEVEL:-info}"
      BACKEND_DB_PATH: "/data/loom.db"
      BACKEND_USERS_DIR: "/data/users"
      BACKEND_PUBLIC_URL: "${BACKEND_PUBLIC_URL}"
      BACKEND_AUTH_MODE: "${BACKEND_AUTH_MODE:-oidc}"
      BACKEND_TIKA_URL: "http://tika:9998"
      BACKEND_TAVILY_URL: "${BACKEND_TAVILY_URL:-https://mcp.tavily.com/mcp/}"
      BACKEND_TAVILY_API_KEY: "${BACKEND_TAVILY_API_KEY}"
      BACKEND_FETCH_MCP_URL: "http://fetch:8090/mcp"
      BACKEND_OBSCURA_MCP_URL: "http://obscura:8090/mcp"
      BACKEND_OIDC_ISSUER: "${BACKEND_OIDC_ISSUER}"
      BACKEND_OIDC_CLIENT_ID: "${BACKEND_OIDC_CLIENT_ID}"
      BACKEND_OIDC_CLIENT_SECRET: "${BACKEND_OIDC_CLIENT_SECRET}"
      BACKEND_OIDC_REDIRECT_URL: "${BACKEND_OIDC_REDIRECT_URL}"
      BACKEND_OIDC_POST_LOGOUT_REDIRECT_URL: "${BACKEND_OIDC_POST_LOGOUT_REDIRECT_URL}"
      BACKEND_OIDC_ADMIN_GROUP: "${BACKEND_OIDC_ADMIN_GROUP:-loom-admins}"
      BACKEND_CHAT_BASE_URL: "${BACKEND_CHAT_BASE_URL}"
      BACKEND_CHAT_API_KEY: "${BACKEND_CHAT_API_KEY}"
      BACKEND_EMBED_BASE_URL: "${BACKEND_EMBED_BASE_URL}"
      BACKEND_EMBED_API_KEY: "${BACKEND_EMBED_API_KEY}"
      BACKEND_EMBED_MODEL: "${BACKEND_EMBED_MODEL:-text-embedding-3-small}"
      BACKEND_CONTEXT7_API_KEY: "${BACKEND_CONTEXT7_API_KEY:-}"
      BACKEND_CONTEXT7_MCP_URL: "${BACKEND_CONTEXT7_MCP_URL:-https://mcp.context7.com/mcp}"
      # Extra MCP servers from ./config/mcp.json (standard mcpServers format; merged on top of built-ins).
      BACKEND_MCP_SERVERS_FILE: "${BACKEND_MCP_SERVERS_FILE:-/config/mcp.json}"
      # Token referenced by mcp.json's ${IPVERSE_API_KEY} (ipverse-lens whois).
      IPVERSE_API_KEY: "${IPVERSE_API_KEY:-}"
      BACKEND_BFL_BASE_URL: "${BACKEND_BFL_BASE_URL:-https://api.bfl.ai/v1}"
      BACKEND_BFL_API_KEY: "${BACKEND_BFL_API_KEY:-}"
      BACKEND_BFL_MODEL: "${BACKEND_BFL_MODEL:-flux-2-klein-4b}"
      BACKEND_SESSION_SECRET: "${BACKEND_SESSION_SECRET}"
    healthcheck:
      test: ["CMD", "/loom", "healthcheck"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 3
    volumes:
      - ./data:/data
      # per-user volumes are mounted manually under /data/users/<user-id>/
      # Read-only config dir for the optional mcp.json (see BACKEND_MCP_SERVERS_FILE).
      - ./config:/config:ro
    networks:
      - loom
      - fetch-mcp
    depends_on:
      tika:
        condition: service_healthy
      obscura:
        # one-shot MCP discovery at startup → wait for Obscura's native MCP server
        condition: service_healthy
      fetch:
        # one-shot MCP discovery at startup → wait for the bridge to be ready
        condition: service_healthy
    labels:
      traefik.enable: "false"

  tika:
    # -full bundles Tesseract for OCR (pin a concrete version in real deployments)
    image: apache/tika:2.9.2.1-full
    restart: unless-stopped
    networks:
      - loom
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9998"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 3
    labels:
      traefik.enable: "false"

  fetch:
    # Lightweight URL/document fetch MCP, bridged to streamable-HTTP by
    # supergateway. Loom reaches it via BACKEND_FETCH_MCP_URL.
    # Keep it off the default app network so fetched URLs cannot resolve app
    # sidecars such as tika by Compose service name.
    image: ghcr.io/trick77/loom-fetch:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const s=require('net').connect(8090,'127.0.0.1');s.setTimeout(3000);s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));s.on('timeout',()=>process.exit(1))"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 6
    networks:
      - fetch-mcp
    labels:
      traefik.enable: "false"

  obscura:
    # Headless-browser MCP. Obscura v0.1.8+ can bind native MCP HTTP to
    # 0.0.0.0, so no local wrapper or stdio bridge is needed.
    # Loom reaches it via BACKEND_OBSCURA_MCP_URL; tools are
    # surfaced to the LLM as obscura__<tool>.
    image: h4ckf0r0day/obscura:0.1.8
    restart: unless-stopped
    command:
      - mcp
      - --http
      - --host
      - 0.0.0.0
      - --port
      - "8090"
      - --stealth
      # Do not add --allow-private-network: Obscura's default private/loopback
      # denylist is part of Loom's SSRF protection for browser tools.
    healthcheck:
      # The upstream image is distroless, so there is no shell/curl/node for a
      # real TCP probe. Startup MCP discovery retries within its 30s deadline to
      # cover any short gap between process start and the HTTP listener binding.
      test: ["CMD", "/obscura", "mcp", "--help"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 6
    networks:
      - loom
    labels:
      traefik.enable: "false"

networks:
  loom:
  fetch-mcp:
  traefik:
    external: true
