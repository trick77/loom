services:
  eve:
    build:
      context: .
      dockerfile: backend/Containerfile
    ports:
      - "8080:8080"
    environment:
      EVE_ADDR: ":8080"
      EVE_DB_PATH: "/data/eve.db"
      EVE_USERS_DIR: "/data/users"
      EVE_TIKA_URL: "http://tika:9998"
      EVE_SEARXNG_URL: "http://searxng:8080"
      EVE_MCP_CONFIG: "/config/mcp.json"
      EVE_CHAT_BASE_URL: "${EVE_CHAT_BASE_URL}"
      EVE_CHAT_API_KEY: "${EVE_CHAT_API_KEY}"
      EVE_CHAT_MODEL: "${EVE_CHAT_MODEL:-MiMo}"
      EVE_EMBED_BASE_URL: "${EVE_EMBED_BASE_URL}"
      EVE_EMBED_API_KEY: "${EVE_EMBED_API_KEY}"
      EVE_ADMIN_INITIAL_PASSWORD: "${EVE_ADMIN_INITIAL_PASSWORD}"
      EVE_SESSION_SECRET: "${EVE_SESSION_SECRET}"
    volumes:
      - eve-data:/data
      - ./mcp.json:/config/mcp.json:ro
      # per-user volumes are mounted manually under /data/users/<user-id>/
    depends_on:
      - searxng
      - tika

  searxng:
    image: searxng/searxng:latest
    environment:
      BASE_URL: "http://localhost:8888/"
    ports:
      - "8888:8080"

  tika:
    # -full bundles Tesseract for OCR (pin a concrete version in real deployments)
    image: apache/tika:2.9.2.1-full

volumes:
  eve-data:
