services:
  slopr-ui:
    image: ghcr.io/trick77/slopr-ui:latest
    ports:
      - "127.0.0.1:8081:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 60s
      timeout: 5s
      start_period: 10s
      start_interval: 5s
      retries: 3
    depends_on:
      slopr:
        condition: service_healthy
    networks:
      - traefik
      - slopr
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik
      traefik.http.routers.slopr.rule: Host(`slopr.trick77.com`)
      traefik.http.routers.slopr.entrypoints: websecure
      traefik.http.routers.slopr.tls: "true"
      traefik.http.services.slopr.loadbalancer.server.port: "80"

  slopr:
    image: ghcr.io/trick77/slopr:latest
    user: "1000:1000"
    environment:
      BACKEND_ADDR: ":8080"
      BACKEND_DB_PATH: "/data/slopr.db"
      BACKEND_USERS_DIR: "/data/users"
      BACKEND_PUBLIC_URL: "${BACKEND_PUBLIC_URL}"
      BACKEND_AUTH_MODE: "${BACKEND_AUTH_MODE:-oidc}"
      BACKEND_TIKA_URL: "http://tika:9998"
      BACKEND_TAVILY_URL: "${BACKEND_TAVILY_URL:-https://mcp.tavily.com/mcp/}"
      BACKEND_TAVILY_API_KEY: "${BACKEND_TAVILY_API_KEY}"
      BACKEND_FETCH_MCP_URL: "http://fetch:8090/mcp"
      BACKEND_OBSCURA_MCP_URL: "http://obscura:8090/mcp"
      BACKEND_OIDC_ISSUER: "${BACKEND_OIDC_ISSUER}"
      BACKEND_OIDC_CLIENT_ID: "${BACKEND_OIDC_CLIENT_ID}"
      BACKEND_OIDC_CLIENT_SECRET: "${BACKEND_OIDC_CLIENT_SECRET}"
      BACKEND_OIDC_REDIRECT_URL: "${BACKEND_OIDC_REDIRECT_URL}"
      BACKEND_OIDC_POST_LOGOUT_REDIRECT_URL: "${BACKEND_OIDC_POST_LOGOUT_REDIRECT_URL}"
      BACKEND_OIDC_ADMIN_GROUP: "${BACKEND_OIDC_ADMIN_GROUP:-slopr-admins}"
      BACKEND_CHAT_BASE_URL: "${BACKEND_CHAT_BASE_URL}"
      BACKEND_CHAT_API_KEY: "${BACKEND_CHAT_API_KEY}"
      BACKEND_CHAT_MODEL: "${BACKEND_CHAT_MODEL:-MiMo}"
      BACKEND_CHAT_REASONING_EFFORT: "${BACKEND_CHAT_REASONING_EFFORT:-high}"
      BACKEND_EMBED_BASE_URL: "${BACKEND_EMBED_BASE_URL}"
      BACKEND_EMBED_API_KEY: "${BACKEND_EMBED_API_KEY}"
      BACKEND_EMBED_MODEL: "${BACKEND_EMBED_MODEL:-text-embedding-3-small}"
      BACKEND_CONTEXT7_API_KEY: "${BACKEND_CONTEXT7_API_KEY:-}"
      BACKEND_CONTEXT7_MCP_URL: "${BACKEND_CONTEXT7_MCP_URL:-https://mcp.context7.com/mcp}"
      BACKEND_BFL_BASE_URL: "${BACKEND_BFL_BASE_URL:-https://api.bfl.ai/v1}"
      BACKEND_BFL_API_KEY: "${BACKEND_BFL_API_KEY:-}"
      BACKEND_BFL_MODEL: "${BACKEND_BFL_MODEL:-flux-2-klein-4b}"
      BACKEND_SESSION_SECRET: "${BACKEND_SESSION_SECRET}"
    healthcheck:
      test: ["CMD", "/slopr", "healthcheck"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 3
    volumes:
      - ./data:/data
      # per-user volumes are mounted manually under /data/users/<user-id>/
    networks:
      - slopr
      - fetch-mcp
    depends_on:
      tika:
        condition: service_healthy
      obscura:
        # one-shot MCP discovery at startup → wait for the bridge to be ready
        condition: service_healthy
      fetch:
        # one-shot MCP discovery at startup → wait for the bridge to be ready
        condition: service_healthy
    labels:
      traefik.enable: "false"

  tika:
    # -full bundles Tesseract for OCR (pin a concrete version in real deployments)
    image: apache/tika:2.9.2.1-full
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9998"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 3
    labels:
      traefik.enable: "false"

  fetch:
    # Lightweight URL/document fetch MCP, bridged to streamable-HTTP by
    # supergateway. Slopr reaches it via BACKEND_FETCH_MCP_URL.
    # Keep it off the default app network so fetched URLs cannot resolve app
    # sidecars such as tika by Compose service name.
    image: ghcr.io/trick77/slopr-fetch:latest
    healthcheck:
      test: ["CMD", "node", "-e", "const s=require('net').connect(8090,'127.0.0.1');s.setTimeout(3000);s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));s.on('timeout',()=>process.exit(1))"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 6
    networks:
      - fetch-mcp
    labels:
      traefik.enable: "false"

  obscura:
    # Headless-browser MCP (Obscura) bridged to streamable-HTTP by supergateway.
    # Slopr reaches it via BACKEND_OBSCURA_MCP_URL; tools are
    # surfaced to the LLM as obscura__<tool>.
    # Obscura is amd64-only (emulated on arm64 hosts).
    platform: linux/amd64
    image: ghcr.io/trick77/slopr-obscura:latest
    healthcheck:
      test: ["CMD", "node", "-e", "const s=require('net').connect(8090,'127.0.0.1');s.setTimeout(3000);s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));s.on('timeout',()=>process.exit(1))"]
      interval: 60s
      timeout: 5s
      start_period: 90s
      start_interval: 5s
      retries: 6
    labels:
      traefik.enable: "false"

networks:
  slopr:
  fetch-mcp:
  traefik:
    external: true
