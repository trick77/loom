services:
  slopr:
    image: "${SLOPR_IMAGE:-ghcr.io/trick77/slopr:latest}"
    ports:
      - "8080:8080"
    environment:
      SLOPR_ADDR: ":8080"
      SLOPR_DB_PATH: "/data/slopr.db"
      SLOPR_USERS_DIR: "/data/users"
      SLOPR_PUBLIC_URL: "${SLOPR_PUBLIC_URL}"
      SLOPR_AUTH_MODE: "${SLOPR_AUTH_MODE:-oidc}"
      SLOPR_TIKA_URL: "http://tika:9998"
      SLOPR_TAVILY_URL: "${SLOPR_TAVILY_URL:-https://mcp.tavily.com/mcp/}"
      SLOPR_TAVILY_API_KEY: "${SLOPR_TAVILY_API_KEY}"
      SLOPR_FETCH_MCP_URL: "http://fetch:8090/mcp"
      SLOPR_OBSCURA_MCP_URL: "http://obscura:8090/mcp"
      SLOPR_OIDC_ISSUER: "${SLOPR_OIDC_ISSUER}"
      SLOPR_OIDC_CLIENT_ID: "${SLOPR_OIDC_CLIENT_ID}"
      SLOPR_OIDC_CLIENT_SECRET: "${SLOPR_OIDC_CLIENT_SECRET}"
      SLOPR_OIDC_REDIRECT_URL: "${SLOPR_OIDC_REDIRECT_URL}"
      SLOPR_OIDC_POST_LOGOUT_REDIRECT_URL: "${SLOPR_OIDC_POST_LOGOUT_REDIRECT_URL}"
      SLOPR_OIDC_ADMIN_GROUP: "${SLOPR_OIDC_ADMIN_GROUP:-slopr-admins}"
      SLOPR_CHAT_BASE_URL: "${SLOPR_CHAT_BASE_URL}"
      SLOPR_CHAT_API_KEY: "${SLOPR_CHAT_API_KEY}"
      SLOPR_CHAT_MODEL: "${SLOPR_CHAT_MODEL:-MiMo}"
      SLOPR_CHAT_REASONING_EFFORT: "${SLOPR_CHAT_REASONING_EFFORT:-high}"
      SLOPR_EMBED_BASE_URL: "${SLOPR_EMBED_BASE_URL}"
      SLOPR_EMBED_API_KEY: "${SLOPR_EMBED_API_KEY}"
      SLOPR_EMBED_MODEL: "${SLOPR_EMBED_MODEL:-text-embedding-3-small}"
      SLOPR_CONTEXT7_API_KEY: "${SLOPR_CONTEXT7_API_KEY:-}"
      SLOPR_CONTEXT7_MCP_URL: "${SLOPR_CONTEXT7_MCP_URL:-https://mcp.context7.com/mcp}"
      SLOPR_BFL_BASE_URL: "${SLOPR_BFL_BASE_URL:-https://api.bfl.ai/v1}"
      SLOPR_BFL_API_KEY: "${SLOPR_BFL_API_KEY:-}"
      SLOPR_BFL_MODEL: "${SLOPR_BFL_MODEL:-flux-2-klein-4b}"
      SLOPR_SESSION_SECRET: "${SLOPR_SESSION_SECRET}"
    volumes:
      - slopr-data:/data
      # per-user volumes are mounted manually under /data/users/<user-id>/
    networks:
      - default
      - fetch-mcp
    depends_on:
      tika:
        condition: service_started
      obscura:
        # one-shot MCP discovery at startup → wait for the bridge to be ready
        condition: service_healthy
      fetch:
        # one-shot MCP discovery at startup → wait for the bridge to be ready
        condition: service_healthy

  tika:
    # -full bundles Tesseract for OCR (pin a concrete version in real deployments)
    image: apache/tika:2.9.2.1-full

  fetch:
    # Lightweight URL/document fetch MCP, bridged to streamable-HTTP by
    # supergateway. Slopr reaches it via SLOPR_FETCH_MCP_URL.
    # Keep it off the default app network so fetched URLs cannot resolve app
    # sidecars such as tika by Compose service name.
    image: "${SLOPR_FETCH_IMAGE:-ghcr.io/trick77/slopr-fetch:latest}"
    networks:
      - fetch-mcp

  obscura:
    # Headless-browser MCP (Obscura) bridged to streamable-HTTP by supergateway.
    # Slopr reaches it via SLOPR_OBSCURA_MCP_URL; tools are
    # surfaced to the LLM as obscura__<tool>.
    # Obscura is amd64-only (emulated on arm64 hosts).
    platform: linux/amd64
    image: "${SLOPR_OBSCURA_IMAGE:-ghcr.io/trick77/slopr-obscura:latest}"

networks:
  default:
  fetch-mcp:

volumes:
  slopr-data:
