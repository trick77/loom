services:
  spark:
    build:
      context: .
      dockerfile: backend/Containerfile
    ports:
      - "8080:8080"
    environment:
      SPARK_ADDR: ":8080"
      SPARK_DB_PATH: "/data/spark.db"
      SPARK_USERS_DIR: "/data/users"
      SPARK_PUBLIC_URL: "${SPARK_PUBLIC_URL}"
      SPARK_AUTH_MODE: "${SPARK_AUTH_MODE:-oidc}"
      SPARK_TIKA_URL: "http://tika:9998"
      SPARK_SEARXNG_URL: "http://searxng:8080"
      SPARK_MCP_CONFIG: "/config/mcp.json"
      SPARK_OIDC_ISSUER: "${SPARK_OIDC_ISSUER}"
      SPARK_OIDC_CLIENT_ID: "${SPARK_OIDC_CLIENT_ID}"
      SPARK_OIDC_CLIENT_SECRET: "${SPARK_OIDC_CLIENT_SECRET}"
      SPARK_OIDC_REDIRECT_URL: "${SPARK_OIDC_REDIRECT_URL}"
      SPARK_OIDC_POST_LOGOUT_REDIRECT_URL: "${SPARK_OIDC_POST_LOGOUT_REDIRECT_URL}"
      SPARK_OIDC_ADMIN_GROUP: "${SPARK_OIDC_ADMIN_GROUP:-spark-admins}"
      SPARK_CHAT_BASE_URL: "${SPARK_CHAT_BASE_URL}"
      SPARK_CHAT_API_KEY: "${SPARK_CHAT_API_KEY}"
      SPARK_CHAT_MODEL: "${SPARK_CHAT_MODEL:-MiMo}"
      SPARK_EMBED_BASE_URL: "${SPARK_EMBED_BASE_URL}"
      SPARK_EMBED_API_KEY: "${SPARK_EMBED_API_KEY}"
      SPARK_EMBED_MODEL: "${SPARK_EMBED_MODEL:-text-embedding-3-small}"
      SPARK_SESSION_SECRET: "${SPARK_SESSION_SECRET}"
    volumes:
      - spark-data:/data
      - ./mcp.json:/config/mcp.json:ro
      # per-user volumes are mounted manually under /data/users/<user-id>/
    depends_on:
      - searxng
      - tika

  searxng:
    image: searxng/searxng:latest
    environment:
      BASE_URL: "http://localhost:8888/"
    ports:
      - "8888:8080"

  tika:
    # -full bundles Tesseract for OCR (pin a concrete version in real deployments)
    image: apache/tika:2.9.2.1-full

volumes:
  spark-data:
