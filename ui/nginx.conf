worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        resolver 127.0.0.11 valid=30s ipv6=off;

        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location /api/ {
            set $slopr_upstream http://slopr:8080;
            proxy_pass $slopr_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
        }

        # Content-hashed build assets are immutable: their filename changes whenever
        # their content does, so they can be cached aggressively and forever.
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files $uri =404;
        }

        # index.html must never be cached: it is the unhashed entry point that
        # references the hashed assets. If a client caches it, a new deploy (with new
        # asset hashes) is never picked up — the browser keeps requesting the old
        # bundle. no-cache forces a revalidation on every load (cheap 304 when
        # unchanged), so a fresh deploy is served immediately.
        location = /index.html {
            add_header Cache-Control "no-cache" always;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
