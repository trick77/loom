# Local development: single embedded binary, dev auth (no authentik), host networking.
#
#   docker compose -f compose.dev.yaml up --build --remove-orphans  # start (UI on http://localhost:8080)
#   docker compose -f compose.dev.yaml down            # stop
#
# Auto-signs in as a fixed "dev" admin user. The dev-auth guard requires a loopback
# BACKEND_ADDR, which is why this uses network_mode: host instead of published ports
# (a 127.0.0.1 bind inside a bridge-network container is unreachable via -p).
#
# Built-in Tavily web search: set BACKEND_TAVILY_API_KEY to enable it (the adapter talks to
# Tavily's hosted MCP server).
services:
  # Pre-creates the data volume with the right ownership for the distroless nonroot user (uid 65532).
  loom-init:
    image: alpine
    command: chown -R 65532:65532 /data
    volumes:
      - loom-dev-data:/data

  loom:
    build:
      context: .
      dockerfile: backend/Containerfile
    network_mode: host
    environment:
      BACKEND_AUTH_MODE: dev
      BACKEND_ADDR: "127.0.0.1:8080"
      BACKEND_LOG_LEVEL: "${BACKEND_LOG_LEVEL:-debug}"
      BACKEND_PUBLIC_URL: "http://localhost:8080"
      BACKEND_SESSION_SECRET: dev-secret-please-change
      BACKEND_DB_PATH: /data/loom.db
      BACKEND_USERS_DIR: /data/users
      BACKEND_TAVILY_URL: "${BACKEND_TAVILY_URL:-https://mcp.tavily.com/mcp/}"
      BACKEND_TAVILY_API_KEY: "${BACKEND_TAVILY_API_KEY:-}"
      BACKEND_FETCH_MCP_URL: "http://localhost:8091/mcp"
      BACKEND_OBSCURA_MCP_URL: "http://localhost:8090/mcp"
      # Optional: point at a real OpenAI-compatible endpoint to actually chat.
      BACKEND_CHAT_BASE_URL: "${BACKEND_CHAT_BASE_URL:-}"
      BACKEND_CHAT_API_KEY: "${BACKEND_CHAT_API_KEY:-}"
      BACKEND_CONTEXT7_API_KEY: "${BACKEND_CONTEXT7_API_KEY:-}"
      BACKEND_CONTEXT7_MCP_URL: "${BACKEND_CONTEXT7_MCP_URL:-https://mcp.context7.com/mcp}"
      # Extra MCP servers from ./conf/mcp.json (standard mcpServers format; merged on top of built-ins).
      BACKEND_MCP_SERVERS_FILE: "${BACKEND_MCP_SERVERS_FILE:-/conf/mcp.json}"
      IPVERSE_API_KEY: "${IPVERSE_API_KEY:-}"
      BACKEND_BFL_BASE_URL: "${BACKEND_BFL_BASE_URL:-https://api.bfl.ai/v1}"
      BACKEND_BFL_API_KEY: "${BACKEND_BFL_API_KEY:-}"
      BACKEND_BFL_MODEL: "${BACKEND_BFL_MODEL:-flux-2-klein-4b}"
    volumes:
      - loom-dev-data:/data
      - ./conf:/conf:ro
    depends_on:
      loom-init:
        condition: service_completed_successfully
      obscura:
        # one-shot MCP discovery at startup → wait for Obscura's native MCP server
        condition: service_healthy
      fetch:
        # one-shot MCP discovery at startup → wait for the bridge to be ready
        condition: service_healthy

  fetch:
    # Lightweight URL/document fetch MCP. Loom is host-networked here, so the
    # bridge is published on a localhost port and reached via BACKEND_FETCH_MCP_URL at
    # http://localhost:8091/mcp.
    build:
      context: ./fetch
      dockerfile: Containerfile
    ports:
      - "127.0.0.1:8091:8090"

  obscura:
    # Headless-browser MCP. Loom is host-networked here, so native MCP HTTP is
    # published on a localhost port and reached via BACKEND_OBSCURA_MCP_URL at
    # http://localhost:8090/mcp.
    image: h4ckf0r0day/obscura:0.1.8
    command:
      - mcp
      - --http
      - --host
      - 0.0.0.0
      - --port
      - "8090"
      - --stealth
      # Do not add --allow-private-network: Obscura's default private/loopback
      # denylist is part of Loom's SSRF protection for browser tools.
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      # The upstream image is distroless, so there is no shell/curl/node for a
      # real TCP probe. Startup MCP discovery retries within its 30s deadline to
      # cover any short gap between process start and the HTTP listener binding.
      test: ["CMD", "/obscura", "mcp", "--help"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 6

volumes:
  loom-dev-data:
