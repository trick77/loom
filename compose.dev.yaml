# Local development: single embedded binary, dev auth (no authentik), host networking.
#
#   docker compose -f compose.dev.yaml up --build --remove-orphans  # start (UI on http://localhost:8080)
#   docker compose -f compose.dev.yaml down            # stop
#
# Auto-signs in as a fixed "dev" admin user. The dev-auth guard requires a loopback
# SLOPR_ADDR, which is why this uses network_mode: host instead of published ports
# (a 127.0.0.1 bind inside a bridge-network container is unreachable via -p).
#
# Built-in Tavily web search: set SLOPR_TAVILY_API_KEY to enable it (the adapter talks to
# Tavily's hosted MCP server).
services:
  # Pre-creates the data volume with the right ownership for the distroless nonroot user (uid 65532).
  slopr-init:
    image: alpine
    command: chown -R 65532:65532 /data
    volumes:
      - slopr-dev-data:/data

  slopr:
    build:
      context: .
      dockerfile: backend/Containerfile
    network_mode: host
    environment:
      SLOPR_AUTH_MODE: dev
      SLOPR_ADDR: "127.0.0.1:8080"
      SLOPR_PUBLIC_URL: "http://localhost:8080"
      SLOPR_SESSION_SECRET: dev-secret-please-change
      SLOPR_DB_PATH: /data/slopr.db
      SLOPR_USERS_DIR: /data/users
      SLOPR_TAVILY_URL: "${SLOPR_TAVILY_URL:-https://mcp.tavily.com/mcp/}"
      SLOPR_TAVILY_API_KEY: "${SLOPR_TAVILY_API_KEY:-}"
      SLOPR_FETCH_MCP_URL: "http://localhost:8091/mcp"
      SLOPR_OBSCURA_MCP_URL: "http://localhost:8090/mcp"
      # Optional: point at a real OpenAI-compatible endpoint to actually chat.
      SLOPR_CHAT_BASE_URL: "${SLOPR_CHAT_BASE_URL:-}"
      SLOPR_CHAT_API_KEY: "${SLOPR_CHAT_API_KEY:-}"
      SLOPR_CHAT_MODEL: "${SLOPR_CHAT_MODEL:-MiMo}"
      SLOPR_CHAT_REASONING_EFFORT: "${SLOPR_CHAT_REASONING_EFFORT:-high}"
      SLOPR_CONTEXT7_API_KEY: "${SLOPR_CONTEXT7_API_KEY:-}"
      SLOPR_CONTEXT7_MCP_URL: "${SLOPR_CONTEXT7_MCP_URL:-https://mcp.context7.com/mcp}"
      SLOPR_BFL_BASE_URL: "${SLOPR_BFL_BASE_URL:-https://api.bfl.ai/v1}"
      SLOPR_BFL_API_KEY: "${SLOPR_BFL_API_KEY:-}"
      SLOPR_BFL_MODEL: "${SLOPR_BFL_MODEL:-flux-2-klein-4b}"
    volumes:
      - slopr-dev-data:/data
    depends_on:
      slopr-init:
        condition: service_completed_successfully
      obscura:
        # one-shot MCP discovery at startup → wait for the bridge to be ready
        condition: service_healthy
      fetch:
        # one-shot MCP discovery at startup → wait for the bridge to be ready
        condition: service_healthy

  fetch:
    # Lightweight URL/document fetch MCP. Slopr is host-networked here, so the
    # bridge is published on a localhost port and reached via SLOPR_FETCH_MCP_URL at
    # http://localhost:8091/mcp.
    build:
      context: ./fetch
      dockerfile: Containerfile
    ports:
      - "127.0.0.1:8091:8090"

  obscura:
    # Headless-browser MCP. Slopr is host-networked here, so the bridge is
    # published on a localhost port and reached via SLOPR_OBSCURA_MCP_URL at
    # http://localhost:8090/mcp.
    # Obscura is amd64-only (emulated on arm64 hosts).
    platform: linux/amd64
    build:
      context: ./obscura
      dockerfile: Containerfile
    ports:
      - "127.0.0.1:8090:8090"

volumes:
  slopr-dev-data:
